experiment:
  name: "tfrbench-reasoning-vs-direct"
  description: "Compare direct LLM prediction vs reasoning-chain prediction on TFRBench"

data:
  dir: "./data"
  # Use subset for quick iteration; set to null for full dataset
  max_samples_per_dataset: 10

datasets:
  # Small & fast (for dev iteration)
  quick:
    - amazon_public.json      # 328 samples, 5 channels, 14→7
    - apple_public.json       # 509 samples, 5 channels, 14→7
  # Full 10 datasets
  all:
    - amazon_public.json
    - apple_public.json
    - NYC_Taxi_public.json
    - car_parts_public.json
    - solar_daily_public.json
    - electricity_public.json
    - traffic_public.json
    - web_traffic_public.json
    - bitbrains_fast_storage_public.json
    - hierarchical_sales_public.json

models:
  - name: claude-sonnet
    provider: anthropic
    model_id: claude-sonnet-4-20250514
  - name: gpt-4.1-mini
    provider: openai
    model_id: gpt-4.1-mini
  - name: gemini-2.5-flash
    provider: google
    model_id: gemini-2.5-flash

strategies:
  - name: direct
    description: "Direct numerical prediction without reasoning"
  - name: reasoning
    description: "Generate reasoning trace first, then predict"

evaluation:
  metrics:
    - mase
    - mae
    - rmse
  judge_model: claude-sonnet-4-20250514
  judge_provider: anthropic

output:
  dir: "./results"
