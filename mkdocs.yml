site_name: Research Harness 中文文档
site_description: 面向长周期 AI 科研 Agent 的 Research Harness 文档站
site_url: https://biajin-pku.github.io/research-harness/
repo_url: https://github.com/Biajin-PKU/research-harness
repo_name: Biajin-PKU/research-harness
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

copyright: Copyright &copy; 2026 Research Harness contributors

nav:
  - 首页: index.md
  - 快速开始: quickstart.zh.md
  - Agent 使用手册: agent-guide.md
  - 论文管理规范: paper-management.zh.md
  - MCP 工具与工作流: mcp-tools.zh.md
  - Zotero 集成: zotero-integration.zh.md
  - 技能系统:
      - 概览: skills/README.md
      - 编写技能: skills/authoring.md
      - 使用技能: skills/consuming.md
  - 架构设计:
      - 架构总览: architecture/README.md
      - Research Primitives: architecture/01_research_primitives.md
      - 执行后端: architecture/02_execution_backend.md
      - Provenance: architecture/03_provenance.md
      - Orchestrator: architecture/06_orchestrator.md
  - 运维与开发:
      - 故障排查: TROUBLESHOOTING.md
      - 插件开发: plugin-guide.md
      - Codex 工作流: codex-workflow.md
      - 本地 Agent 工作流: local-agent-workflow.md
  - 发布与路线图:
      - Roadmap: roadmap.md
      - Release Notes v0.4.0: RELEASE_NOTES_v0.4.0.md
      - GitHub Release Checklist: GITHUB_RELEASE_CHECKLIST.md

theme:
  name: material
  language: zh
  logo: assets/hero.png
  favicon: assets/hero.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search

# Some historical design notes contain raw HTML snippets that Python 3.9
# html.parser cannot handle during MkDocs rendering. Keep them in the repo,
# but exclude them from the first public Chinese docs build.
exclude_docs: |
  v3_design/RELEASE_NOTES.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
