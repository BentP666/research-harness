[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "paperindex"
version = "0.3.0"
description = "Thin compatibility shim — the real engine lives in research_harness.paperindex"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
  # The shim re-exports research_harness.paperindex. The [paperindex] extra
  # on research-harness pulls the PDF runtime deps (pymupdf, PyPDF2, pyyaml,
  # tiktoken) — standalone `pip install paperindex` gets them automatically.
  "research-harness[paperindex]>=0.3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[project.scripts]
paperindex = "paperindex.cli:main"
