[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "research-harness-mcp"
version = "0.4.0"
description = "MCP server exposing research_harness primitives as Claude Code tools"
requires-python = ">=3.11"
dependencies = [
    "research-harness",
    "paperindex",
    "mcp>=1.0",
]

[project.optional-dependencies]
api = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["research_harness_mcp*"]
